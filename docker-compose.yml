services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: sqlite:////data/db.sqlite3
    volumes:
      - mediatracker-data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  mediatracker-data:
